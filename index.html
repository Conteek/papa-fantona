<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Любимое видео Сергея Гунина</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0f0f0f;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        h1 {
            color: #ff0000;
            margin-bottom: 20px;
            text-align: center;
        }
        .container {
            max-width: 900px;
            width: 100%;
            padding: 20px;
        }
        .video-wrapper {
            position: relative;
            padding-top: 56.25%; /* 16:9 соотношение */
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
        }
        .video-wrapper iframe,
        .video-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .description {
            margin-top: 25px;
            text-align: center;
            font-size: 1.4em;
            color: #ffcccc;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Любимое видео Сергея Гунина</h1>
        
        <div class="video-wrapper">
            <video controls autoplay>
                <source src="https://web.archive.org/web/20210325155407im_/http://kekma.net/zzart.mp4" type="video/mp4">
                Ваш браузер не поддерживает видео.
            </video>
        </div>

        <div class="description">
            Пытаются выебать с два хуя (русское)
        </div>
    </div>
</body>
</html>
